<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarryGo - 消息</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background: var(--gray-50);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1rem;
        }
        
        .chat-item {
            display: flex;
            gap: 0.875rem;
            padding: 1rem 1.25rem;
            background: white;
            cursor: pointer;
            transition: var(--transition);
        }
        
        .chat-item:hover {
            background: var(--gray-50);
        }
        
        .chat-content {
            flex: 1;
            min-width: 0;
        }
        
        .chat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.25rem;
        }
        
        .chat-name {
            font-weight: 600;
            font-size: 0.9375rem;
        }
        
        .chat-time {
            font-size: 0.75rem;
            color: var(--gray-400);
        }
        
        .chat-preview {
            font-size: 0.875rem;
            color: var(--gray-500);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .unread-badge {
            background: var(--primary);
            color: white;
            font-size: 0.75rem;
            padding: 0.125rem 0.5rem;
            border-radius: 9999px;
            font-weight: 600;
            min-width: 20px;
            text-align: center;
        }
        
        .chat-post-tag {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            font-size: 0.75rem;
            color: var(--gray-500);
            background: var(--gray-100);
            padding: 0.25rem 0.5rem;
            border-radius: 9999px;
            margin-top: 0.375rem;
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="status-bar">
            <span>9:41</span>
            <span>📶 🔋</span>
        </div>
        <div class="phone-notch"></div>
        
        <div class="phone-content">
            <div class="header">
                <h1 class="header-title">消息</h1>
            </div>
            
            <!-- Chat Item 1: Proposal Confirmation -->
            <div class="chat-item" onclick="window.location.href='chat-detail-proposal-review.html'" style="background: var(--primary-light); border-left: 4px solid var(--primary);">
                <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=100&h=100&fit=crop" alt="User" class="avatar">
                <div class="chat-content">
                    <div class="chat-header">
                        <span class="chat-name">Linda</span>
                        <span class="chat-time">刚刚</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <span class="chat-preview" style="font-weight: 600; color: var(--primary);">🧳 收到我可以帮带：奶粉 3kg</span>
                        <span class="unread-badge">1</span>
                    </div>
                    <div class="chat-post-tag">
                        ⏳ 待我确认 · 柏林 → 上海
                    </div>
                </div>
            </div>
            
            <!-- Chat Item 2: Application to Me -->
            <div class="chat-item" onclick="window.location.href='chat-detail.html'">
                <img src="https://images.unsplash.com/photo-1438761681033-6461ffad8d80?w=100&h=100&fit=crop" alt="User" class="avatar">
                <div class="chat-content">
                    <div class="chat-header">
                        <span class="chat-name">Alice</span>
                        <span class="chat-time">1小时前</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <span class="chat-preview">📦 申请帮带：MacBook Pro (2kg)</span>
                    </div>
                    <div class="chat-post-tag">
                        ⏳ 待我确认 · 慕尼黑 → 成都
                    </div>
                </div>
            </div>
            
            <!-- Chat Item 3 -->
            <div class="chat-item" onclick="window.location.href='chat-detail.html'">
                <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=100&h=100&fit=crop" alt="User" class="avatar">
                <div class="chat-content">
                    <div class="chat-header">
                        <span class="chat-name">Amy</span>
                        <span class="chat-time">昨天</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <span class="chat-preview">谢谢啦！</span>
                    </div>
                    <div class="chat-post-tag">
                        🧳 慕尼黑 → 成都
                    </div>
                </div>
            </div>
            
            <!-- Chat Item 4 -->
            <div class="chat-item" onclick="window.location.href='chat-detail.html'">
                <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=100&h=100&fit=crop" alt="User" class="avatar">
                <div class="chat-content">
                    <div class="chat-header">
                        <span class="chat-name">David</span>
                        <span class="chat-time">3天前</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <span class="chat-preview">好的，合作愉快！</span>
                    </div>
                    <div class="chat-post-tag">
                        📦 已完成帮带
                    </div>
                </div>
            </div>
            
            <div style="height: 1rem;"></div>
        </div>
        
        <div class="tab-bar">
            <a href="home.html" class="tab-item" data-page="home">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                </svg>
                <span>首页</span>
            </a>
            <a href="publish.html" class="tab-item" data-page="publish">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                </svg>
                <span>发布</span>
            </a>
            <a href="digital-luggage.html" class="tab-item" data-page="digital-luggage">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
                </svg>
                <span>行李箱</span>
            </a>
            <a href="chat.html" class="tab-item active" data-page="chat">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
                </svg>
                <span>消息</span>
            </a>
            <a href="profile.html" class="tab-item" data-page="profile">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                </svg>
                <span>我的</span>
            </a>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
