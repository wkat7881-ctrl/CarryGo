<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarryGo - 物品状态</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background: var(--gray-50);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1rem;
        }

        .item-header {
            background: white;
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--gray-100);
        }

        .item-info {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .item-icon-bg {
            width: 56px;
            height: 56px;
            background: var(--primary-light);
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.75rem;
        }

        .item-details {
            flex: 1;
        }

        .item-name {
            font-weight: 700;
            font-size: 1.125rem;
            margin-bottom: 0.25rem;
        }

        .item-meta {
            font-size: 0.875rem;
            color: var(--gray-500);
        }

        .requester-info {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding-top: 0.75rem;
            border-top: 1px solid var(--gray-100);
        }

        .requester-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
        }

        .requester-name {
            font-size: 0.875rem;
            font-weight: 500;
        }

        .status-section {
            padding: 1.5rem;
        }

        .status-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--gray-800);
        }

        .status-track {
            position: relative;
            padding-left: 2rem;
        }

        .status-track::before {
            content: '';
            position: absolute;
            left: 0.75rem;
            top: 1.5rem;
            bottom: 1.5rem;
            width: 2px;
            background: var(--gray-200);
        }

        .status-item {
            position: relative;
            padding-bottom: 2rem;
        }

        .status-item:last-child {
            padding-bottom: 0;
        }

        .status-dot {
            position: absolute;
            left: -2rem;
            top: 0;
            width: 1.5rem;
            height: 1.5rem;
            border-radius: 50%;
            background: var(--gray-200);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1;
            border: 2px solid white;
        }

        .status-item.completed .status-dot,
        .status-item.current .status-dot {
            background: var(--primary);
        }

        .status-item.current .status-dot {
            box-shadow: 0 0 0 4px var(--primary-light);
            transform: scale(1.1);
        }

        .status-dot-icon {
            font-size: 0.875rem;
            color: white;
        }

        .status-content {
            background: white;
            border-radius: var(--radius-xl);
            padding: 1rem 1.25rem;
            box-shadow: var(--shadow-sm);
        }

        .status-item.current .status-content {
            border: 2px solid var(--primary);
            background: var(--primary-light);
        }

        .status-name {
            font-weight: 600;
            font-size: 0.9375rem;
            margin-bottom: 0.25rem;
        }

        .status-item.completed .status-name,
        .status-item.current .status-name {
            color: var(--primary);
        }

        .status-desc {
            font-size: 0.8125rem;
            color: var(--gray-500);
        }

        .status-time {
            font-size: 0.75rem;
            color: var(--gray-400);
            margin-top: 0.5rem;
        }

        .hint-box {
            margin: 0 1.5rem 1rem;
            padding: 0.875rem 1rem;
            background: var(--gray-50);
            border-radius: var(--radius-lg);
            font-size: 0.8125rem;
            color: var(--gray-600);
            line-height: 1.6;
        }

        .actions-section {
            padding: 0 1.5rem 1.5rem;
        }

        .action-btn {
            width: 100%;
            padding: 0.9375rem 1.5rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: var(--radius-lg);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(109, 94, 245, 0.3);
            margin-bottom: 0.75rem;
        }

        .action-btn.secondary {
            background: white;
            color: var(--gray-700);
            border: 1px solid var(--gray-200);
            box-shadow: none;
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="status-bar">
            <span>9:41</span>
            <span>📶 🔋</span>
        </div>
        <div class="phone-notch"></div>

        <div class="phone-content" style="padding-top: 0; padding-bottom: 150px;">
            <div class="header">
                <div class="back-btn" onclick="window.location.href='digital-luggage.html'">
                    <svg style="width: 20px; height: 20px;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                    </svg>
                </div>
                <span style="font-weight: 600;">物品详情</span>
                <div style="width: 40px;"></div>
            </div>

            <div class="item-header">
                <div class="item-info">
                    <div class="item-icon-bg">🍼</div>
                    <div class="item-details">
                        <div class="item-name">爱他美奶粉（3罐）</div>
                        <div class="item-meta">3kg · Berlin → Shanghai</div>
                    </div>
                </div>
                <div class="requester-info">
                    <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=200&h=200&fit=crop" alt="Requester" class="requester-avatar">
                    <span class="requester-name">Tom</span>
                    <div class="chat-btn" onclick="window.location.href='chat-detail-proposal-review.html'" style="margin-left: auto; padding: 0.375rem 0.75rem;">💬 联系</div>
                </div>
            </div>

            <div class="status-section">
                <h3 class="status-title">当前状态</h3>
                <div class="status-track" id="statusTrack">
                    <div class="status-item completed">
                        <div class="status-dot">
                            <span class="status-dot-icon">✓</span>
                        </div>
                        <div class="status-content">
                            <div class="status-name">已确认</div>
                            <div class="status-desc">需求方已同意，这件物品已加入你的行李箱</div>
                            <div class="status-time">2024-08-10 10:30</div>
                        </div>
                    </div>

                    <div class="status-item current" id="completeStatus">
                        <div class="status-dot">
                            <span class="status-dot-icon">·</span>
                        </div>
                        <div class="status-content">
                            <div class="status-name">已完成</div>
                            <div class="status-desc">你和收货方分别确认完成后，即可进入评价</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="hint-box">
                这里不再区分交付中、运输中等细状态。当前只保留“已确认”和“已完成”两个状态，减少理解成本。
            </div>

            <div class="actions-section">
                <button class="action-btn" onclick="markComplete()">✅ 我已完成交付</button>
                <button class="action-btn secondary" onclick="window.location.href='chat-detail-proposal-review.html'">💬 联系对方</button>
            </div>
        </div>

        <div class="tab-bar">
            <a href="home.html" class="tab-item" data-page="home">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                </svg>
                <span>首页</span>
            </a>
            <a href="publish.html" class="tab-item" data-page="publish">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                </svg>
                <span>发布</span>
            </a>
            <a href="digital-luggage.html" class="tab-item active" data-page="digital-luggage">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
                </svg>
                <span>行李箱</span>
            </a>
            <a href="chat.html" class="tab-item" data-page="chat">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
                </svg>
                <span>消息</span>
            </a>
            <a href="profile.html" class="tab-item" data-page="profile">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                </svg>
                <span>我的</span>
            </a>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="js/app.js"></script>
    <script>
        function markComplete() {
            const statusItem = document.getElementById('completeStatus');
            statusItem.classList.remove('current');
            statusItem.classList.add('completed');
            const dot = statusItem.querySelector('.status-dot-icon');
            if (dot) dot.textContent = '✓';
            const content = statusItem.querySelector('.status-content');
            if (content && !content.querySelector('.status-time')) {
                const timeDiv = document.createElement('div');
                timeDiv.className = 'status-time';
                timeDiv.textContent = new Date().toLocaleString('zh-CN');
                content.appendChild(timeDiv);
            }
            showToast('你已标记完成，等待收货方确认', 'success');
            setTimeout(() => {
                window.location.href = 'request-order-detail.html';
            }, 1000);
        }
    </script>
</body>
</html>
