<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarryGo - 申请成功</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background: var(--gray-50);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1rem;
        }
        
        .success-container {
            text-align: center;
            padding: 3rem 1.5rem;
        }
        
        .success-icon {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, var(--primary), #a78bfa);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
            box-shadow: 0 10px 30px rgba(109, 94, 245, 0.25);
        }
        
        .success-icon span {
            font-size: 3rem;
        }
        
        .success-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
            color: var(--gray-900);
        }
        
        .success-subtitle {
            font-size: 0.9375rem;
            color: var(--gray-600);
            margin-bottom: 2rem;
            line-height: 1.6;
        }
        
        .order-card {
            background: white;
            border-radius: var(--radius-xl);
            padding: 1.25rem;
            margin-bottom: 2rem;
            box-shadow: var(--shadow-sm);
            text-align: left;
        }
        
        .order-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
        }
        
        .order-status {
            display: inline-flex;
            align-items: center;
            gap: 0.375rem;
            padding: 0.375rem 0.75rem;
            background: #fef3c7;
            color: #92400e;
            border-radius: 9999px;
            font-size: 0.8125rem;
            font-weight: 600;
        }
        
        .order-details {
            border-top: 1px solid var(--gray-100);
            padding-top: 1rem;
        }
        
        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0;
            font-size: 0.875rem;
        }
        
        .detail-label {
            color: var(--gray-500);
        }
        
        .detail-value {
            font-weight: 500;
            color: var(--gray-900);
        }
        
        .action-btn {
            display: block;
            width: 100%;
            padding: 0.9375rem 1.5rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: var(--radius-lg);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(109, 94, 245, 0.3);
            text-decoration: none;
            text-align: center;
        }
        
        .action-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(109, 94, 245, 0.4);
        }
        
        .secondary-link {
            display: block;
            margin-top: 1rem;
            color: var(--gray-500);
            font-size: 0.875rem;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="status-bar">
            <span>9:41</span>
            <span>📶 🔋</span>
        </div>
        <div class="phone-notch"></div>
        
        <div class="phone-content">
            <div class="header">
                <div class="back-btn" onclick="window.location.href='home.html'">
                    <svg style="width: 20px; height: 20px;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                    </svg>
                </div>
                <span style="font-weight: 600;">申请成功</span>
                <div style="width: 40px;"></div>
            </div>
            
            <div class="success-container">
                <div class="success-icon">
                    <span>✓</span>
                </div>
                
                <h2 class="success-title">申请已提交！</h2>
                <p class="success-subtitle">
                    你的帮带申请已发送给张明，等待他确认后即可开始沟通。
                </p>
                
                <div class="order-card">
                    <div class="order-header">
                        <span style="font-weight: 600;">申请详情</span>
                        <span class="order-status">⏳ 待确认</span>
                    </div>
                    
                    <div class="order-details">
                        <div class="detail-row">
                            <span class="detail-label">物品名称</span>
                            <span class="detail-value">MacBook Pro</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">物品重量</span>
                            <span class="detail-value">2 kg</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">路线</span>
                            <span class="detail-value">慕尼黑 → 成都</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">帮带费用</span>
                            <span class="detail-value">¥100</span>
                        </div>
                    </div>
                </div>
                
                <a href="chat.html" class="action-btn">查看消息</a>
                <a href="home.html" class="secondary-link">返回首页</a>
            </div>
        </div>
        
        <div class="tab-bar">
            <a href="home.html" class="tab-item active" data-page="home">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                </svg>
                <span>首页</span>
            </a>
            <a href="publish.html" class="tab-item" data-page="publish">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                </svg>
                <span>发布</span>
            </a>
            <a href="digital-luggage.html" class="tab-item" data-page="digital-luggage">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
                </svg>
                <span>行李箱</span>
            </a>
            <a href="chat.html" class="tab-item" data-page="chat">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
                </svg>
                <span>消息</span>
            </a>
            <a href="profile.html" class="tab-item" data-page="profile">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                </svg>
                <span>我的</span>
            </a>
        </div>
    </div>
    
    <div class="toast" id="toast"></div>

    <script src="js/app.js"></script>
</body>
</html>
