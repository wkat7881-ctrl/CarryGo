<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CarryGo - 首页</title>
    <link rel="stylesheet" href="css/style.css" />
    <style>
      body {
        background: var(--gray-50);
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 1rem;
      }

      .filter-tabs {
        display: flex;
        gap: 0.5rem;
        padding: 0 1.25rem 1rem;
        overflow-x: auto;
      }

      .filter-tab {
        padding: 0.5rem 1rem;
        background: white;
        border-radius: 9999px;
        font-size: 0.875rem;
        font-weight: 500;
        color: var(--gray-600);
        white-space: nowrap;
        cursor: pointer;
        transition: var(--transition);
      }

      .filter-tab.active {
        background: var(--primary);
        color: white;
      }

      .post-card {
        margin: 0 1.25rem 1rem;
        background: white;
        border-radius: var(--radius-xl);
        padding: 1.25rem;
        box-shadow: var(--shadow-sm);
        cursor: pointer;
        transition: var(--transition);
      }

      .post-card:hover {
        box-shadow: var(--shadow-md);
      }

      .post-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 0.75rem;
      }

      .route-info {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        margin-bottom: 0.5rem;
      }

      .route-city {
        font-weight: 600;
        font-size: 1rem;
      }

      .route-arrow {
        color: var(--primary);
      }

      .post-meta {
        display: flex;
        gap: 0.75rem;
        flex-wrap: wrap;
        margin-top: 0.75rem;
      }

      .meta-item {
        display: flex;
        align-items: center;
        gap: 0.25rem;
        font-size: 0.8125rem;
        color: var(--gray-500);
      }

      .post-footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-top: 1rem;
        padding-top: 1rem;
        border-top: 1px solid var(--gray-100);
      }

      .user-info {
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }
    </style>
  </head>
  <body>
    <div class="phone-frame">
      <div class="status-bar">
        <span>9:41</span>
        <span>📶 🔋</span>
      </div>
      <div class="phone-notch"></div>

      <div class="phone-content">
        <div class="header">
          <h1 class="header-title">发现帮带</h1>
          <img
            src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=100&h=100&fit=crop"
            alt="Profile"
            class="avatar"
          />
        </div>

        <div style="padding: 0 1.25rem 1rem">
          <div style="position: relative">
            <input
              type="text"
              placeholder="搜索城市或物品..."
              class="input"
              style="padding-left: 2.75rem"
            />
            <svg
              style="
                position: absolute;
                left: 1rem;
                top: 50%;
                transform: translateY(-50%);
                width: 20px;
                height: 20px;
                color: var(--gray-400);
              "
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
              />
            </svg>
          </div>
        </div>

        <div class="filter-tabs">
          <div class="filter-tab active">全部</div>
          <div class="filter-tab">慕尼黑</div>
          <div class="filter-tab">柏林</div>
          <div class="filter-tab">巴黎</div>
          <div class="filter-tab">伦敦</div>
        </div>

        <!-- Post 1 -->
        <div
          class="post-card animate-fadeIn"
          onclick="window.location.href = 'post-detail.html'"
        >
          <div class="post-header">
            <span class="badge badge-primary">🛫 提供帮带</span>
            <span style="font-size: 0.8125rem; color: var(--gray-500)"
              >2小时前</span
            >
          </div>
          <div class="route-info">
            <span class="route-city">慕尼黑</span>
            <span class="route-arrow">→</span>
            <span class="route-city">成都</span>
          </div>
          <p
            style="
              color: var(--gray-600);
              font-size: 0.875rem;
              margin-bottom: 0.5rem;
            "
          >
            可帮带物品，8月18日出发
          </p>
          <div class="post-meta">
            <div class="meta-item">
              <svg
                style="width: 16px; height: 16px"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"
                />
              </svg>
              8月18日
            </div>
            <div class="meta-item">
              <svg
                style="width: 16px; height: 16px"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"
                />
              </svg>
              剩余 8kg
            </div>
            <div class="meta-item">
              <svg
                style="width: 16px; height: 16px"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
                />
              </svg>
              ¥50/kg
            </div>
          </div>
          <div class="post-footer">
            <div class="user-info">
              <img
                src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=100&h=100&fit=crop"
                alt="User"
                class="avatar"
                style="width: 32px; height: 32px"
              />
              <div>
                <div style="font-weight: 500; font-size: 0.875rem">Linda</div>
                <div
                  style="
                    font-size: 0.75rem;
                    color: var(--gray-400);
                    display: flex;
                    align-items: center;
                    gap: 0.25rem;
                  "
                >
                  23次帮带
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Post 2 - Seeking Carry -->
        <div
          class="post-card animate-fadeIn"
          style="animation-delay: 0.1s"
          onclick="window.location.href = 'post-detail-request.html'"
        >
          <div class="post-header">
            <span class="badge badge-warning">📦 寻求帮带</span>
            <span style="font-size: 0.8125rem; color: var(--gray-500)"
              >5小时前</span
            >
          </div>
          <div class="route-info">
            <span class="route-city">柏林</span>
            <span class="route-arrow">→</span>
            <span class="route-city">上海</span>
          </div>
          <p
            style="
              color: var(--gray-600);
              font-size: 0.875rem;
              margin-bottom: 0.5rem;
            "
          >
            需要帮带奶粉，7月20日前
          </p>
          <div class="post-meta">
            <div class="meta-item">
              <svg
                style="width: 16px; height: 16px"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"
                />
              </svg>
              7月20日
            </div>
            <div class="meta-item">
              <svg
                style="width: 16px; height: 16px"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"
                />
              </svg>
              需要 3kg
            </div>
          </div>
          <div class="post-footer">
            <div class="user-info">
              <img
                src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=100&h=100&fit=crop"
                alt="User"
                class="avatar"
                style="width: 32px; height: 32px"
              />
              <div>
                <div style="font-weight: 500; font-size: 0.875rem">Tom</div>
                <div
                  style="
                    font-size: 0.75rem;
                    color: var(--gray-400);
                    display: flex;
                    align-items: center;
                    gap: 0.25rem;
                  "
                >
                  12次帮带
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Post 3 -->
        <div
          class="post-card animate-fadeIn"
          style="animation-delay: 0.2s"
          onclick="window.location.href = 'post-detail.html'"
        >
          <div class="post-header">
            <span class="badge badge-primary">🛫 提供帮带</span>
            <span style="font-size: 0.8125rem; color: var(--gray-500)"
              >昨天</span
            >
          </div>
          <div class="route-info">
            <span class="route-city">巴黎</span>
            <span class="route-arrow">→</span>
            <span class="route-city">北京</span>
          </div>
          <p
            style="
              color: var(--gray-600);
              font-size: 0.875rem;
              margin-bottom: 0.5rem;
            "
          >
            可帮带奢侈品，8月25日出发
          </p>
          <div class="post-meta">
            <div class="meta-item">
              <svg
                style="width: 16px; height: 16px"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"
                />
              </svg>
              8月25日
            </div>
            <div class="meta-item">
              <svg
                style="width: 16px; height: 16px"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"
                />
              </svg>
              剩余 5kg
            </div>
            <div class="meta-item">
              <svg
                style="width: 16px; height: 16px"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
                />
              </svg>
              ¥80/kg
            </div>
          </div>
          <div class="post-footer">
            <div class="user-info">
              <img
                src="https://images.unsplash.com/photo-1438761681033-6461ffad8d80?w=100&h=100&fit=crop"
                alt="User"
                class="avatar"
                style="width: 32px; height: 32px"
              />
              <div>
                <div style="font-weight: 500; font-size: 0.875rem">Sophie</div>
                <div
                  style="
                    font-size: 0.75rem;
                    color: var(--gray-400);
                    display: flex;
                    align-items: center;
                    gap: 0.25rem;
                  "
                >
                  45次帮带
                </div>
              </div>
            </div>
          </div>
        </div>

        <div style="height: 1rem"></div>
      </div>

      <div class="tab-bar">
        <a href="home.html" class="tab-item active" data-page="home">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"
            />
          </svg>
          <span>首页</span>
        </a>
        <a href="publish.html" class="tab-item" data-page="publish">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M12 4v16m8-8H4"
            />
          </svg>
          <span>发布</span>
        </a>
        <a
          href="digital-luggage.html"
          class="tab-item"
          data-page="digital-luggage"
        >
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"
            />
          </svg>
          <span>行李箱</span>
        </a>
        <a href="chat.html" class="tab-item" data-page="chat">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"
            />
          </svg>
          <span>消息</span>
        </a>
        <a href="profile.html" class="tab-item" data-page="profile">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"
            />
          </svg>
          <span>我的</span>
        </a>
      </div>
    </div>

    <script src="js/app.js"></script>
  </body>
</html>
