<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CarryGo - 我的</title>
    <link rel="stylesheet" href="css/style.css" />
    <style>
      body {
        background: var(--gray-50);
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 1rem;
      }

      .profile-header {
        background: linear-gradient(135deg, var(--primary) 0%, #8b5cf6 100%);
        padding: 2rem 1.25rem 1.5rem;
        color: white;
      }

      .profile-info {
        display: flex;
        align-items: center;
        gap: 1rem;
        margin-bottom: 1.5rem;
      }

      .profile-avatar {
        width: 72px;
        height: 72px;
        border-radius: 50%;
        border: 3px solid rgba(255, 255, 255, 0.3);
      }

      .profile-name {
        font-size: 1.25rem;
        font-weight: 700;
        margin-bottom: 0.25rem;
      }

      .profile-bio {
        font-size: 0.875rem;
        opacity: 0.9;
      }

      .stats-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 0.75rem;
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(10px);
        border-radius: var(--radius-xl);
        padding: 1rem;
        margin-bottom: 1rem;
      }

      .stat-item {
        text-align: center;
      }

      .stat-value {
        font-size: 1.5rem;
        font-weight: 700;
      }

      .stat-label {
        font-size: 0.75rem;
        opacity: 0.9;
        margin-top: 0.25rem;
      }

      .trust-badges {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
      }

      .trust-badge {
        display: inline-flex;
        align-items: center;
        gap: 0.375rem;
        padding: 0.5rem 0.875rem;
        background: rgba(109, 94, 245, 0.95);
        border: 1px solid rgba(255, 255, 255, 0.18);
        box-shadow: 0 8px 18px rgba(17, 24, 39, 0.18);
        border-radius: 9999px;
        font-size: 0.8125rem;
        font-weight: 600;
        color: white;
      }

      .trust-badges-hint {
        font-size: 0.8125rem;
        color: rgba(255, 255, 255, 0.85);
        margin-top: 0.25rem;
      }

      .section {
        margin-top: 1rem;
      }

      .section-title {
        font-size: 0.875rem;
        font-weight: 600;
        color: var(--gray-500);
        padding: 1rem 1.25rem 0.5rem;
      }

      .menu-item {
        display: flex;
        align-items: center;
        gap: 0.875rem;
        padding: 1rem 1.25rem;
        background: white;
        cursor: pointer;
        transition: var(--transition);
      }

      .menu-item:hover {
        background: var(--gray-50);
      }

      .menu-icon {
        width: 36px;
        height: 36px;
        border-radius: var(--radius-lg);
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--primary);
      }

      .menu-text {
        flex: 1;
        font-weight: 500;
        font-size: 0.9375rem;
      }

      .menu-arrow {
        color: var(--gray-400);
      }

      .request-card {
        background: white;
        margin: 0 1.25rem 1rem;
        border-radius: var(--radius-xl);
        padding: 1rem;
        box-shadow: var(--shadow-sm);
        border: 1px solid var(--gray-100);
        cursor: pointer;
        transition: var(--transition);
      }

      .request-card:hover {
        box-shadow: var(--shadow-md);
      }

      .request-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 0.75rem;
      }

      .request-title {
        font-weight: 600;
        font-size: 0.9375rem;
      }

      .request-status {
        padding: 0.25rem 0.625rem;
        border-radius: 9999px;
        font-size: 0.75rem;
        font-weight: 600;
        background: var(--primary-light);
        color: var(--primary);
      }

      .request-meta {
        font-size: 0.8125rem;
        color: var(--gray-500);
        margin-bottom: 0.75rem;
        line-height: 1.6;
      }

      .carrier-row {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding-top: 0.75rem;
        border-top: 1px solid var(--gray-100);
      }

      .carrier-name {
        font-size: 0.875rem;
        font-weight: 600;
      }

      .carrier-sub {
        font-size: 0.75rem;
        color: var(--gray-500);
      }
    </style>
  </head>

    <script src="js/app.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const params = new URLSearchParams(window.location.search);
        const profileUserId = params.get("user") || "zhangming";

        const profileUsers = {
          zhangming: {
            name: "张明",
            bio: "慕尼黑留学生 · 经常往返中德",
            avatar:
              "https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=200&h=200&fit=crop",
            stats: { count: 23, kg: 89 },
          },
          linda: {
            name: "Linda",
            bio: "常旅客 · 慕尼黑 → 成都",
            avatar:
              "https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=200&h=200&fit=crop",
            stats: { count: 23, kg: 62 },
          },
          tom: {
            name: "Tom",
            bio: "经常往返柏林 · 上海",
            avatar:
              "https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=200&h=200&fit=crop",
            stats: { count: 12, kg: 28 },
          },
          sophie: {
            name: "Sophie",
            bio: "巴黎出发 · 帮带经验丰富",
            avatar:
              "https://images.unsplash.com/photo-1438761681033-6461ffad8d80?w=200&h=200&fit=crop",
            stats: { count: 45, kg: 120 },
          },
        };

        const profile = profileUsers[profileUserId] || {
          name: profileUserId,
          bio: "",
          avatar:
            "https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=200&h=200&fit=crop",
          stats: { count: 0, kg: 0 },
        };

        const nameEl = document.getElementById("profileName");
        const bioEl = document.getElementById("profileBio");
        const avatarEl = document.getElementById("profileAvatar");
        const statCountEl = document.getElementById("statCarryCount");
        const statKgEl = document.getElementById("statCarryKg");

        if (nameEl) nameEl.textContent = profile.name;
        if (bioEl) bioEl.textContent = profile.bio;
        if (avatarEl) avatarEl.src = profile.avatar;
        if (statCountEl) statCountEl.textContent = profile.stats.count;
        if (statKgEl) statKgEl.textContent = profile.stats.kg;

        const badgeContainer = document.getElementById("trustBadges");

        const tradeCount = window.cgGetCompletedTradeCount
          ? window.cgGetCompletedTradeCount(profileUserId)
          : 0;
        const visibleBadges = window.cgGetVisibleTrustBadges
          ? window.cgGetVisibleTrustBadges(profileUserId)
          : [];

        if (tradeCount < 3) {
          badgeContainer.style.display = "none";
          return;
        }

        if (!visibleBadges.length) {
          badgeContainer.style.display = "none";
          return;
        }

        badgeContainer.style.display = "flex";
        badgeContainer.innerHTML = visibleBadges
          .map(
            (badge) =>
              `<div class="trust-badge"><span>${badge.icon}</span><span>${badge.label}</span></div>`,
          )
          .join("");
      });
    </script>
