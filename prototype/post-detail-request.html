<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarryGo - 寻求帮带</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="phone-frame">
        <div class="status-bar">
            <span>9:41</span>
            <span>📶 🔋</span>
        </div>
        <div class="phone-notch"></div>

        <div class="phone-content" style="padding-bottom: 120px;">
            <div class="header">
                <div class="back-btn" onclick="window.location.href='home.html'">
                    <svg style="width: 20px; height: 20px;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                    </svg>
                </div>
                <span style="font-weight: 600;">寻求帮带</span>
                <div style="width: 40px;"></div>
            </div>

            <div style="padding: 1.25rem;">
                <div class="badge badge-warning" style="margin-bottom: 1rem; display: inline-flex;">📦 寻求帮带</div>

                <div class="route-info" style="margin-bottom: 1.25rem;">
                    <span class="route-city">柏林</span>
                    <span class="route-arrow">→</span>
                    <span class="route-city">上海</span>
                </div>

                <div style="padding: 1rem; background: var(--primary-light); border-radius: var(--radius-xl); margin-bottom: 1rem;">
                    <div style="font-weight: 600; color: var(--primary); margin-bottom: 0.375rem;">这是一条寻求帮带帖子</div>
                    <div style="font-size: 0.875rem; color: var(--gray-600); line-height: 1.6;">
                        你可以先发送一条帮带提议，由需求方确认是否接受。只有对方接受后，这件物品才会正式加入你的行李箱并扣减容量。
                    </div>
                </div>

                <div class="detail-section">
                    <h3 class="detail-title">需求说明</h3>
                    <p style="color: var(--gray-700); line-height: 1.6;">
                        需要帮带奶粉，7月20日前送达上海。奶粉是爱他美 Pre 段，共 3 罐，总重量约 3kg，希望能面交。
                    </p>
                </div>

                <div class="detail-section">
                    <h3 class="detail-title">物品信息</h3>
                    <div class="detail-item">
                        <span class="detail-label">物品类型</span>
                        <span class="detail-value">爱他美奶粉（3罐）</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">重量</span>
                        <span class="detail-value">3kg</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">期望日期</span>
                        <span class="detail-value">7月20日前</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">报酬</span>
                        <span class="detail-value" style="color: var(--primary); font-weight: 600;">¥180</span>
                    </div>
                </div>

                <div class="detail-section">
                    <h3 class="detail-title">发布者</h3>
                    <div class="user-card">
                        <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=100&h=100&fit=crop" alt="User" class="avatar">
                        <div class="user-info">
                            <div style="font-weight: 600;">Tom</div>
                            <div style="font-size: 0.8125rem; color: var(--gray-500);">12次帮带</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="action-buttons" style="position: absolute; bottom: 0; left: 0; right: 0; background: white; padding: 1rem 1.25rem; display: flex; gap: 0.75rem; border-top: 1px solid var(--gray-100); z-index: 10;">
            <button class="btn btn-secondary" style="flex: 1;" onclick="window.location.href='chat.html'">
                💬 消息
            </button>
            <button class="btn btn-primary" style="flex: 1;" onclick="openModal('proposal-modal')">
                🧳 我可以帮带
            </button>
        </div>

        <div class="tab-bar" style="bottom: 80px;">
            <a href="home.html" class="tab-item active" data-page="home">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                </svg>
                <span>首页</span>
            </a>
            <a href="publish.html" class="tab-item" data-page="publish">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                </svg>
                <span>发布</span>
            </a>
            <a href="digital-luggage.html" class="tab-item" data-page="digital-luggage">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
                </svg>
                <span>行李箱</span>
            </a>
            <a href="chat.html" class="tab-item" data-page="chat">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
                </svg>
                <span>消息</span>
            </a>
            <a href="profile.html" class="tab-item" data-page="profile">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                </svg>
                <span>我的</span>
            </a>
        </div>
    </div>

    <div class="modal-overlay" id="proposal-modal">
        <div class="modal">
            <div class="modal-header">
                <span style="font-weight: 600; font-size: 1.125rem;">发送帮带提议</span>
                <div class="modal-close" onclick="closeModal('proposal-modal')" style="cursor: pointer; width: 32px; height: 32px; border-radius: 50%; background: var(--gray-100); display: flex; align-items: center; justify-content: center;">
                    <svg style="width: 18px; height: 18px;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </div>
            </div>
            <div class="modal-body">
                <div style="padding: 1rem; background: var(--primary-light); border-radius: var(--radius-lg); margin-bottom: 1rem;">
                    <div style="font-weight: 600; margin-bottom: 0.5rem;">提议内容</div>
                    <div style="display: flex; justify-content: space-between; font-size: 0.875rem; margin-bottom: 0.375rem;">
                        <span>爱他美奶粉（3罐）</span>
                        <span style="font-weight: 600;">3kg</span>
                    </div>
                    <div style="font-size: 0.8125rem; color: var(--gray-600);">
                        发送后会先进入私信，等待 Tom 确认是否接受。
                    </div>
                </div>

                <div style="margin-bottom: 1rem;">
                    <label style="display: block; font-size: 0.875rem; font-weight: 500; margin-bottom: 0.5rem;">计划放入的行李箱</label>
                    <select class="input" style="margin-bottom: 1rem;">
                        <option>慕尼黑 → 成都（当前剩余 7kg）</option>
                        <option>柏林 → 上海（当前剩余 5kg）</option>
                    </select>
                </div>

                <div style="margin-bottom: 1rem;">
                    <label style="display: block; font-size: 0.875rem; font-weight: 500; margin-bottom: 0.5rem;">给对方的留言</label>
                    <textarea class="textarea" rows="3" placeholder="例如：我 7 月 18 日从柏林飞上海，可以机场面交。"></textarea>
                </div>

                <button class="btn btn-primary btn-full" onclick="sendProposal()">
                    ✉️ 发送帮带提议
                </button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="js/app.js"></script>
    <script>
        function openModal(modalId) {
            document.getElementById(modalId).classList.add('active');
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }

        function sendProposal() {
            closeModal('proposal-modal');
            showToast('提议已发出，等待对方确认', 'success');
            setTimeout(() => {
                window.location.href = 'chat.html';
            }, 1000);
        }
    </script>
</body>
</html>
